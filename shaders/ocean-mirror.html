<script>
// フルスクリーン三角形の頂点シェーダー(全モジュール共通)
const vertexShaderCode = /* wgsl */ `
@vertex
fn vs_main(@builtin(vertex_index) vertexIndex: u32) -> @builtin(position) vec4<f32> {
  var pos = array<vec2<f32>, 3>(
    vec2<f32>(-1.0, -1.0),
    vec2<f32>( 3.0, -1.0),
    vec2<f32>(-1.0,  3.0)
  );
  return vec4<f32>(pos[vertexIndex], 0.0, 1.0);
}
`;

// 海面を波のない完全な平面(y=0)として扱い、shaders/sky-precise.htmlで焼き込んだ
// equirectangular PNGを空として反射させる海。
// ガーストナー波(shaders/ocean-gerstner.html)のような高さフィールドの探索・粗さによる
// 表面散乱・白波は持たないが、太陽方向への明示的なハイライト(sunDisc())と、
// 水面下の海中の単散乱(waterRadiance()。吸収・散乱係数から閉形式で厳密に積分する。
// 水の色はハードコードせず、純水の吸収の波長依存から自然に青が出る)と、
// 指定した深さにある平らな海底(プロシージャルな砂地の模様、Lambertian反射)を計算する。
// 無限に平らな鏡面なので反射方向は視線方向だけで決まり(法線が(0,1,0)で一定なため、
// 水面上のどの位置で反射しても結果は同じ)、空の反射には交差点の座標を使わないが、
// 海底の模様の位置決めには水面への入射点+屈折方向から求めた海底の座標を使う。
// 海中の閉形式積分も海底も乱数を使わない決定的な計算なので、蓄積(時間積分)は不要で、
// フレームごとに再計算するだけのリアルタイム描画になっている。
const traceShaderCode = /* wgsl */ `
${vertexShaderCode}

struct Uniforms {
  resAndSun: vec4<f32>,   // xy = resolution, z = sunHour(太陽の時刻), w = ハイライト円盤の半径(ラジアン)
  waterParams: vec4<f32>, // x = 濁り(0..1), y = ハイライト強度, z = 海の深さ(m), w = 未使用
};
@group(0) @binding(0) var<uniform> uniforms: Uniforms;
@group(0) @binding(1) var envTex: texture_2d<f32>;
@group(0) @binding(2) var envSampler: sampler;

const PI: f32 = 3.14159265;

// 太陽がどれだけ地平線の上にあるか(0=夜, 1=昼)。透過色の明るさに使う。
fn sunVisibilityOf(sunDir: vec3<f32>) -> f32 {
  return smoothstep(-0.12, 0.06, sunDir.y);
}

// shaders/sky-precise.htmlの太陽軌道式と同じもの(インポートした空の太陽位置と、
// この式で計算するsunDirを一致させるため複製している)。
fn hourToSunDir(hour: f32) -> vec3<f32> {
  let sunAngle = (hour - 6.0) / 12.0 * PI;
  return normalize(vec3<f32>(cos(sunAngle) * 0.35, sin(sunAngle), -0.9));
}

// 方向ベクトル(y=上)からequirectangular(緯度経度)テクスチャのUVへ変換。
// shaders/sky-precise.htmlの焼き込みと同じ規約。
fn dirToEquirectUV(dir: vec3<f32>) -> vec2<f32> {
  let phi = atan2(dir.z, dir.x);
  let theta = acos(clamp(dir.y, -1.0, 1.0));
  let u = phi / (2.0 * PI) + 0.5;
  let v = theta / PI;
  return vec2<f32>(u, v);
}

// sky-precise.htmlがエクスポートするPNGは既にReinhardトーンマップ+ガンマ補正済みの
// 表示用LDR画像であり、sky-precise.html自身の表示パスもこれをサンプリングして出力
// している(太陽円盤だけは焼き込まれていないので表示時に解析的に重ねる。下記sunDisc
// 参照)。この海のシェーダーでは、空の反射はこのLDRを表示空間のまま使い、
// 海中の散乱(waterRadiance)だけ線形HDRで計算して同じReinhard+ガンマ(tonemapGamma)で
// 表示空間へ変換してから合成する。焼き込みと同じトーンカーブを通すので明るさの
// スケールが揃う(HDR蓄積バッファを持たないので、空をHDRへ逆変換して合成し直す構成は
// 取らない)。
// 非uniformな分岐の中から呼ぶため、textureSampleではなくtextureSampleLevelでLODを明示する
// (README「落とし穴」参照: 非uniform制御フロー内でtextureSampleは呼べない)。
fn sampleSky(dir: vec3<f32>) -> vec3<f32> {
  let uv = dirToEquirectUV(dir);
  return textureSampleLevel(envTex, envSampler, uv, 0.0).rgb;
}

// ---- 海中の散乱 ----
// 水の色は一切ハードコードせず、海水の光学係数(吸収・散乱の波長依存)から計算で出す。
// 純水の吸収係数(1/m)。赤ほど強く吸収される(Pope & Fry 1997の実測の代表値)。
// 「海が青い」のはこの吸収の波長依存が主因。
const WATER_ABSORPTION = vec3<f32>(0.45, 0.063, 0.0092);
// 純海水の分子散乱係数(1/m)。レイリー散乱と同様に短波長(青)ほど強い。
const WATER_MOL_SCATTER = vec3<f32>(0.0017, 0.0032, 0.0062);
// 濁り(懸濁粒子)スライダー最大時の粒子散乱係数(1/m)。粒子は大きいので波長依存はほぼ無い。
const PARTICLE_SCATTER_MAX = vec3<f32>(0.08, 0.08, 0.08);
// 濁り最大時の粒子(植物プランクトン等)の吸収係数(1/m)。クロロフィルは青と赤を
// 吸収して緑を残すため、濁った水は自然に緑側へ寄る。
const PARTICLE_ABSORPTION_MAX = vec3<f32>(0.06, 0.008, 0.09);
const WATER_IOR: f32 = 1.33;
// 太陽の照度。sky-precise.htmlのSUN_INTENSITYと同じ値を使い、同じReinhard+ガンマで
// トーンマップすることで、インポートした空の明るさとスケールを揃える。
const SUN_INTENSITY: f32 = 15.0;

// 位相関数(どちらもsky-precise.htmlと同じ式)
fn rayleighPhase(cosTheta: f32) -> f32 {
  return 3.0 / (16.0 * PI) * (1.0 + cosTheta * cosTheta);
}
fn hgPhase(cosTheta: f32, g: f32) -> f32 {
  let g2 = g * g;
  let denom = 1.0 + g2 - 2.0 * g * cosTheta;
  return (1.0 - g2) / (4.0 * PI * pow(max(denom, 1e-4), 1.5));
}

// sky-precise.htmlのresolveパスと同じReinhard+ガンマ。海中の散乱は線形HDRで計算し、
// 空の焼き込みと同じこのカーブで表示空間へ変換して合成する
fn tonemapGamma(color: vec3<f32>) -> vec3<f32> {
  let mapped = color / (color + vec3<f32>(1.0));
  return pow(max(mapped, vec3<f32>(0.0)), vec3<f32>(1.0 / 2.2));
}

// Schlick近似のフレネル反射率(空気->水、垂直入射で0.02)
fn schlickFresnel(cosTheta: f32) -> f32 {
  let f0 = 0.02;
  return f0 + (1.0 - f0) * pow(1.0 - max(cosTheta, 0.0), 5.0);
}

// ---- 海底 ----
fn hash21(p: vec2<f32>) -> f32 {
  var p3 = fract(vec3<f32>(p.x, p.y, p.x) * 0.1031);
  p3 = p3 + dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

// 格子点のハッシュ値を滑らかに補間する2Dバリューノイズ(0..1)
fn valueNoise(p: vec2<f32>) -> f32 {
  let i = floor(p);
  let f = fract(p);
  let u = f * f * (3.0 - 2.0 * f);
  let a = hash21(i);
  let b = hash21(i + vec2<f32>(1.0, 0.0));
  let c = hash21(i + vec2<f32>(0.0, 1.0));
  let d = hash21(i + vec2<f32>(1.0, 1.0));
  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}

// 海底(平面)のアルベド。プロシージャルな砂地の模様:
// - 砂紋(波と直交方向に走る縞。位相を低周波ノイズで揺らして自然にうねらせる)
// - 低周波ノイズによる暗い斑(海草・岩場のつもり)
// - 細かい粒感
// distはカメラから海底までの水中経路長。遠方では模様の周波数が画素間隔を超えて
// モアレ(エイリアシング)になるため、距離に応じて模様を平均色へフェードさせる
// (ocean-gerstner.htmlの白波の距離フェードと同じ考え方)。
fn seafloorAlbedo(p: vec2<f32>, dist: f32) -> vec3<f32> {
  let sand = vec3<f32>(0.42, 0.38, 0.30);
  let dark = vec3<f32>(0.10, 0.13, 0.09);

  // 砂紋: 波長約0.8mの縞。valueNoiseで位相を±3ラジアン程度揺らす
  let rippleDir = normalize(vec2<f32>(1.0, 0.35));
  let wobble = (valueNoise(p * 0.35) - 0.5) * 6.0;
  let ripple = sin(dot(p, rippleDir) * 8.0 + wobble);
  let rippleShade = 0.85 + 0.15 * ripple;

  // 細かい粒感(最も高周波なので最も速くフェードさせる)
  let grain = 0.9 + 0.2 * hash21(floor(p * 24.0));
  let grainFade = 1.0 - smoothstep(4.0, 12.0, dist);
  let grainShade = mix(1.0, grain, grainFade);

  // 砂紋のフェード(粒感より低周波なので少し遠くまで残す)
  let rippleFade = 1.0 - smoothstep(10.0, 40.0, dist);
  let rippleShadeFaded = mix(1.0, rippleShade, rippleFade);

  var albedo = sand * rippleShadeFaded * grainShade;

  // 暗い斑: 低周波なので最後までフェードさせない(遠方でも見える大きさ)
  // (変数名: "patch"はWGSLの予約語なので使えない。"target"と同じ落とし穴)
  let darkPatch = smoothstep(0.55, 0.75, valueNoise(p * 0.15));
  albedo = mix(albedo, dark, darkPatch * 0.85);
  return albedo;
}

// 水面下の単散乱を閉形式で厳密に積分した、水中から水面へ向かう上向き放射輝度(線形HDR)。
//
// モデル: 水は均質で、深さdepth(m)に平らな海底がある。太陽の平行光が水面で屈折して
// 差し込み(フレネル透過)、屈折した視線の経路上の各点で1回散乱して眼に届く。
// 経路上の距離sの点は深さ z = s*dy (dy = 屈折視線の下向き成分)にあり、そこへ届く
// 太陽光の水中経路長は z/sy (sy = 屈折太陽光の下向き成分)。消散係数c(吸収+散乱)による
// 減衰を両経路に掛け、海底までの経路長 sMax = depth/dy で積分を打ち切ると
//   L = Σ_i b_i P_i(θ) E_uw ∫[0,sMax] exp(-c s) exp(-c s dy/sy) ds
//     = Σ_i b_i P_i(θ) E_uw (1 - exp(-c (1 + dy/sy) sMax)) / (c (1 + dy/sy))
// と解析的に積分できる(iは分子散乱/粒子散乱。係数b_iと位相関数P_iが異なる)。
// depthを大きくするとexp項が消えて元の無限深度の式に滑らかに収束する。
// これに海底(Lambertian)の寄与
//   L_floor = albedo/π × (海底に届く照度) × exp(-c sMax)   (往路=太陽光の下り、復路=視線の上り)
// を加える。レイマーチも乱数も不要な決定的計算なので、このシェーダーの1パス構成のまま使える。
//
// 既知の簡略化: 多重散乱は含まない(散乱アルベドb/cが大きい濁った水ほど過小評価)。
// 太陽光の大気透過(夕方の赤み)はsunVisibilityOfの減光のみで近似。
// 海底に落ちる波の集光模様(コースティクス)は水面が完全平面なので原理的に生じない。
fn waterRadiance(rayDir: vec3<f32>, sunDir: vec3<f32>, turbidity: f32, skyZenithLinear: vec3<f32>, depth: f32, surfaceXZ: vec2<f32>) -> vec3<f32> {
  let up = vec3<f32>(0.0, 1.0, 0.0);
  // 空気->水の屈折。視線(下向き)と、太陽光の進行方向(-sunDir)の両方
  let viewW = refract(rayDir, up, 1.0 / WATER_IOR);
  let sunW = refract(-sunDir, up, 1.0 / WATER_IOR);
  let dy = max(-viewW.y, 1e-3);
  let sy = max(-sunW.y, 1e-3);

  let bMol = WATER_MOL_SCATTER;
  let bPart = PARTICLE_SCATTER_MAX * turbidity;
  let extinction = WATER_ABSORPTION + PARTICLE_ABSORPTION_MAX * turbidity + bMol + bPart;

  // 屈折した視線が海底に届くまでの水中経路長
  let sMax = depth / dy;

  // 散乱角: 水中を進む太陽光(sunW)から、眼へ向かう方向(-viewW)への散乱
  let cosTheta = dot(sunW, -viewW);
  // 水面直下の太陽照度(ビームに垂直な面での照度。sky-preciseのNEEと同じ規約)。
  // 水面のフレネル透過(1-F)を掛け、夜はsunVisibilityOfで消灯する
  let eUnderwater = vec3<f32>(1.0, 0.98, 0.92) * SUN_INTENSITY * sunVisibilityOf(sunDir)
                  * (1.0 - schlickFresnel(max(sunDir.y, 0.0)));
  let kSun = extinction * (1.0 + dy / sy);
  let pathFactor = (1.0 - exp(-kSun * sMax)) / kSun;
  // 粒子の位相関数は強い前方散乱(Petzold測定の代表値 g≈0.924 のHenyey-Greenstein)
  var radiance = (bMol * rayleighPhase(cosTheta) + bPart * hgPhase(cosTheta, 0.924)) * eUnderwater * pathFactor;

  // 天空光(太陽以外の空全体からの拡散光)の寄与の近似。天頂の空の輝度を代表値として
  // 半球一様な入射(照度 = π * 輝度)とみなし、等方位相 1/(4π)・拡散光の平均斜入射による
  // 経路の伸び(係数2)で直達光と同じ閉形式を流用する。厳密な積分ではないが、
  // 直達光が弱い朝夕や日陰側で水が不自然な真っ黒になるのを防ぐ
  let kSky = extinction * (1.0 + 2.0 * dy);
  radiance += skyZenithLinear * PI * (bMol + bPart) * (1.0 / (4.0 * PI)) * (1.0 - exp(-kSky * sMax)) / kSky;

  // 海底(平面、Lambertian)の寄与。
  // 海底に届く照度 = 直達光(水平な床への入射なのでcos = sy を掛け、深さ/syの経路で減衰)
  //              + 天空光(半球拡散の平均斜入射として経路2×depthで減衰)
  // それをアルベド/πで等方に反射し、視線経路sMaxぶんの減衰を掛けて眼に届く。
  // 模様の座標は屈折した視線が実際に海底へ達する位置(水面の入射点 + viewW.xz * sMax)。
  let floorXZ = surfaceXZ + viewW.xz * sMax;
  let albedo = seafloorAlbedo(floorXZ, sMax);
  let eFloor = eUnderwater * sy * exp(-extinction * (depth / sy))
             + skyZenithLinear * PI * exp(-extinction * 2.0 * depth);
  radiance += albedo / PI * eFloor * exp(-extinction * sMax);

  return radiance;
}

// 太陽の円盤(直視・反射どちらも)。sky-precise.htmlは太陽円盤をequirectテクスチャに
// 焼き込まない方式(円盤はLDR化で輝度がクリップされ、テクセル解像度・bilinear補間で
// 痩せて不安定だったため。詳細はsky-precise.htmlのincludeSunDiscのコメント参照)なので、
// インポートPNGに太陽は含まれておらず、このシェーダーが太陽の時刻から解析的に描く。
// 円盤はレイ方向(直視)または反射方向(水面)と太陽方向sunDirの「なす角」だけで決まる
// (shaders/sky-precise.htmlの太陽円盤 smoothstep(cos(0.02), cos(0.009), dot(rayDir, sunDir))
// と同じ考え方)。ただし半径・強さの扱いは直視と反射で分ける:
// - 直視(空)の太陽は「実物」なので、実際の太陽の見かけの角半径(SUN_ANGULAR_RADIUS、
//   sky-precise.htmlの円盤と同じ0.02ラジアン)と固定の強さで描き、スライダーの影響を受けない
// - 反射(水面)のハイライトは「ハイライトの鋭さ/強さ」スライダーで演出的に調整できる
//   (レンズのにじみに相当する広がりの表現)。最も鋭い設定にすると直視の太陽と
//   ほぼ同じ大きさになり、完全な平面鏡としての鏡像に一致する
//
// 【重要】最初はshaders/ocean-gerstner.htmlのsunGlitter()と同じBlinn-Phong方式
// (視線と太陽方向のハーフベクトルhalfDir=normalize(view+sun)と法線の内積のべき乗)を
// そのまま流用したが、これは水面全体に無数の異なる傾きの微小面がある「粗い」水面を
// 前提にした近似であり、視線が浅い角度になるほどhalfDirと法線のなす角が真の反射角
// (reflDirとsunDirのなす角)からずれていく性質がある。roughnessゼロの完全な平面に
// このズレをそのまま持ち込むと、水平線に近づくほどハイライトが手前に間延びした涙形
// (いわゆる写真の"sun glitter path")になってしまい、平らな鏡面では本来歪まず円形に
// 映るはずの太陽の形と矛盾する。反射方向と太陽方向の「なす角」だけに依存する円盤の式
// (下記)に置き換えることで、視線角度によらず常に真円のハイライトになる。
fn sunDisc(reflDir: vec3<f32>, sunDir: vec3<f32>, outerRadius: f32) -> f32 {
  let cosAngle = dot(reflDir, sunDir);
  let cosOuter = cos(outerRadius);
  let cosInner = cos(outerRadius * 0.45);
  return smoothstep(cosOuter, cosInner, cosAngle);
}

// 実際の太陽の見かけの角半径(sky-precise.htmlのSUN_ANGULAR_RADIUS_OUTERと同じ)。
// 直視の太陽円盤はこの固定値で描く(ハイライトのスライダーは反射側だけに効く)
const SUN_ANGULAR_RADIUS: f32 = 0.02;

@fragment
fn fs_main(@builtin(position) fragCoord: vec4<f32>) -> @location(0) vec4<f32> {
  let res = uniforms.resAndSun.xy;
  let sunHour = uniforms.resAndSun.z;
  let sunDir = hourToSunDir(sunHour);
  let highlightRadius = uniforms.resAndSun.w;
  let turbidity = uniforms.waterParams.x;
  let highlightIntensity = uniforms.waterParams.y;
  let seaDepth = uniforms.waterParams.z;

  // 天空光の代表値としてインポートした空の天頂輝度を1回サンプリングし、LDR(トーンマップ済み)
  // から逆Reinhard(ガンマ2.2 -> m/(1-m)、飽和対策で0.98にクランプ)で概算の線形HDRへ戻す。
  // waterRadiance()の天空光項で使う
  let zenithLdr = sampleSky(vec3<f32>(0.0, 1.0, 0.0));
  let zenithMapped = min(pow(max(zenithLdr, vec3<f32>(0.0)), vec3<f32>(2.2)), vec3<f32>(0.98));
  let skyZenithLinear = zenithMapped / (vec3<f32>(1.0) - zenithMapped);

  // 固定カメラ(水平方向を向く。shaders/ocean-gerstner.htmlと同じ配置)
  let eye = vec3<f32>(0.0, 2.5, 0.0);
  let forward = vec3<f32>(0.0, 0.0, -1.0);
  let worldUp = vec3<f32>(0.0, 1.0, 0.0);
  let right = normalize(cross(forward, worldUp));
  let up = cross(right, forward);
  let fov = 1.5;

  // 水平線のジャギーを抑えるための2x2グリッドのサブピクセルオフセット(乱数なし、固定パターン)
  var offsets = array<vec2<f32>, 4>(
    vec2<f32>(-0.25, -0.25), vec2<f32>(0.25, -0.25),
    vec2<f32>(-0.25,  0.25), vec2<f32>(0.25,  0.25),
  );

  var colorSum = vec3<f32>(0.0, 0.0, 0.0);
  for (var i = 0u; i < 4u; i = i + 1u) {
    let ndc = ((fragCoord.xy + offsets[i]) - 0.5 * res) / res.y;
    let rayDir = normalize(forward + right * ndc.x * fov - up * ndc.y * fov);

    var sampleColor: vec3<f32>;
    if (rayDir.y >= -0.0005) {
      // 水平線より上 = 空を直接見ている。インポートPNGは太陽円盤を含まないので、
      // 実際の太陽サイズの解析円盤をここで重ねる。これは「実物」なので、
      // ハイライトの鋭さ/強さスライダー(反射の演出用)の影響は受けない
      sampleColor = sampleSky(rayDir);
      let disc = sunDisc(rayDir, sunDir, SUN_ANGULAR_RADIUS) * sunVisibilityOf(sunDir);
      sampleColor += vec3<f32>(1.0, 0.98, 0.92) * disc;
    } else {
      // 無限に平らな鏡面(法線は常に(0,1,0))なので、反射方向はy成分の符号を
      // 反転するだけで求まり、反射点の位置は結果に影響しない
      let reflDir = vec3<f32>(rayDir.x, -rayDir.y, rayDir.z);
      let sky = sampleSky(reflDir);

      // Fresnel(Schlick近似): dot(視線, 法線) = dot(-rayDir, (0,1,0)) = -rayDir.y
      let cosTheta = max(-rayDir.y, 0.0);
      let fresnel = schlickFresnel(cosTheta);

      // 視線が水面(y=0)に入射する点。海底の模様の位置決めに使う
      // (この分岐はrayDir.y < -0.0005が保証されているのでゼロ除算しない)
      let tSurf = -eye.y / rayDir.y;
      let surfaceXZ = eye.xz + rayDir.xz * tSurf;

      // 海中の単散乱+海底(線形HDR)。水中から空気へ出るときのフレネル透過(1-F)と、
      // 屈折率n^2による放射輝度の圧縮(水中の輝度は空気側でL/n^2になる)を線形側で
      // 掛けてから、焼き込みと同じトーンカーブで表示空間へ変換する
      let underwater = waterRadiance(rayDir, sunDir, turbidity, skyZenithLinear, seaDepth, surfaceXZ)
                     * (1.0 - fresnel) / (WATER_IOR * WATER_IOR);
      var waterColorResult = tonemapGamma(underwater) + sky * fresnel;
      let disc = sunDisc(reflDir, sunDir, highlightRadius) * sunVisibilityOf(sunDir);
      waterColorResult += vec3<f32>(1.0, 0.98, 0.92) * disc * highlightIntensity;
      sampleColor = waterColorResult;
    }
    colorSum += sampleColor;
  }

  return vec4<f32>(colorSum / 4.0, 1.0);
}
`;

async function main() {
  const canvas = document.getElementById('gpuCanvas');

  if (!navigator.gpu) {
    showError('このブラウザはWebGPUに対応していません。\nChrome/Edge の最新版などでお試しください。');
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    showError('WebGPUアダプタの取得に失敗しました。');
    return;
  }
  const device = await adapter.requestDevice();
  device.lost.then((info) => console.log('WebGPU device lost:', info.reason, info.message));

  const context = canvas.getContext('webgpu');
  const canvasFormat = navigator.gpu.getPreferredCanvasFormat();

  const traceModule = device.createShaderModule({ code: traceShaderCode });
  const tracePipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: traceModule, entryPoint: 'vs_main' },
    fragment: { module: traceModule, entryPoint: 'fs_main', targets: [{ format: canvasFormat }] },
    primitive: { topology: 'triangle-list' },
  });

  const uniformBuffer = device.createBuffer({
    size: 32,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  // インポート待ちの間に表示するプレースホルダ(1x1、控えめな青)。
  // インポートすると実サイズのテクスチャを作り直す。
  function createEnvTexture(width, height) {
    return device.createTexture({
      size: [width, height],
      format: 'rgba8unorm',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT |
             GPUTextureUsage.COPY_DST,
    });
  }
  let envTexture = createEnvTexture(1, 1);
  device.queue.writeTexture(
    { texture: envTexture },
    new Uint8Array([20, 30, 45, 255]),
    { bytesPerRow: 4 },
    { width: 1, height: 1 },
  );
  let envView = envTexture.createView();
  // 方位角方向は0..2PIで一周するのでrepeat(継ぎ目の補間のため)、天頂方向はclamp
  const envSampler = device.createSampler({
    magFilter: 'linear',
    minFilter: 'linear',
    addressModeU: 'repeat',
    addressModeV: 'clamp-to-edge',
  });

  let traceBindGroup = null;
  function rebuildBindGroup() {
    traceBindGroup = device.createBindGroup({
      layout: tracePipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: uniformBuffer } },
        { binding: 1, resource: envView },
        { binding: 2, resource: envSampler },
      ],
    });
  }
  rebuildBindGroup();

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const size = Math.max(1, Math.floor(Math.min(window.innerWidth, window.innerHeight) * dpr));
    canvas.width = size;
    canvas.height = size;
    context.configure({ device, format: canvasFormat, alphaMode: 'opaque' });
  }
  window.addEventListener('resize', resize);
  resize();

  // UI: 太陽の時刻(インポート画像との整合用) / 水の濁り
  let sunHour = 10.0;

  const sunHourInput = document.getElementById('sunHour');
  const sunHourVal = document.getElementById('sunHourVal');
  function formatHour(h) {
    const hh = Math.floor(h);
    const mm = Math.round((h - hh) * 60);
    return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
  }
  sunHourInput.addEventListener('input', () => {
    sunHour = parseFloat(sunHourInput.value);
    sunHourVal.textContent = formatHour(sunHour);
  });

  // 水の濁り(0..1)。海中の散乱係数・吸収係数へのスケールとしてシェーダーに渡す
  // (水の色そのものは選ばせず、光学係数から計算で色が出る)
  let turbidity = 0.1;
  const turbidityInput = document.getElementById('turbidity');
  const turbidityVal = document.getElementById('turbidityVal');
  turbidityInput.addEventListener('input', () => {
    turbidity = parseInt(turbidityInput.value, 10) / 100;
    turbidityVal.textContent = turbidityInput.value + '%';
  });
  turbidity = parseInt(turbidityInput.value, 10) / 100;

  // 海の深さ(m)。屈折した視線がこの深さの平面(海底)に届いたところで散乱の積分を
  // 打ち切り、海底からの反射光を加える。深くするほど無限深度の見た目に収束する
  let seaDepth = 5.0;
  const seaDepthInput = document.getElementById('seaDepth');
  const seaDepthVal = document.getElementById('seaDepthVal');
  seaDepthInput.addEventListener('input', () => {
    seaDepth = parseFloat(seaDepthInput.value);
    seaDepthVal.textContent = seaDepth.toFixed(1) + 'm';
  });
  seaDepth = parseFloat(seaDepthInput.value);

  // ハイライト円盤の半径(ラジアン)・強さ(倍率)。円盤の半径は反射方向と太陽方向の
  // 「なす角」だけで決まる(shaders/sky-precise.htmlの太陽円盤と同じ考え方)ため、
  // 視線角度によらず常に真円になる。鋭さのスライダーは対数的に半径へマッピングする
  // (線形だとハイライトの見た目の変化が高い側に偏ってしまうため)。最も鋭い側は
  // sky-precise.htmlの太陽円盤(外側半径0.02ラジアン)とほぼ同じ大きさにしてある。
  let highlightRadius = 0.05;
  let highlightIntensity = 1.5;

  const highlightSharpnessInput = document.getElementById('highlightSharpness');
  const highlightSharpnessVal = document.getElementById('highlightSharpnessVal');
  function updateHighlightSharpness() {
    const t = parseInt(highlightSharpnessInput.value, 10) / 100;
    highlightRadius = Math.pow(10, -1.7 + (1 - t) * 1.0); // 鋭さ100→0.02rad(実際の太陽円盤相当) 〜 鋭さ1→0.2rad(滲んだ光)
    highlightSharpnessVal.textContent = String(highlightSharpnessInput.value);
  }
  highlightSharpnessInput.addEventListener('input', updateHighlightSharpness);
  updateHighlightSharpness();

  const highlightIntensityInput = document.getElementById('highlightIntensity');
  const highlightIntensityVal = document.getElementById('highlightIntensityVal');
  highlightIntensityInput.addEventListener('input', () => {
    highlightIntensity = parseInt(highlightIntensityInput.value, 10) / 100;
    highlightIntensityVal.textContent = highlightIntensityInput.value + '%';
  });
  highlightIntensity = parseInt(highlightIntensityInput.value, 10) / 100;

  // sky-precise.htmlがエクスポートするPNGには焼き込み時刻がtEXtチャンク
  // (キーワード "sunHour")として埋め込まれている。太陽円盤はPNGに含まれず
  // このシェーダーが時刻から解析的に描くため、時刻の取り違えは太陽の位置ズレに
  // 直結する。インポート時に読み出してスライダーへ自動反映する。
  // (この関数はsky-precise.html / ocean-gerstner.htmlにも複製している)
  function readSunHourFromPng(pngBuffer) {
    const bytes = new Uint8Array(pngBuffer);
    const view = new DataView(pngBuffer);
    let pos = 8; // PNGシグネチャの直後から
    while (pos + 12 <= bytes.length) {
      const len = view.getUint32(pos);
      const type = String.fromCharCode(bytes[pos + 4], bytes[pos + 5], bytes[pos + 6], bytes[pos + 7]);
      if (type === 'tEXt') {
        const data = bytes.subarray(pos + 8, pos + 8 + len);
        const sep = data.indexOf(0);
        if (sep > 0 && String.fromCharCode.apply(null, data.subarray(0, sep)) === 'sunHour') {
          const value = parseFloat(String.fromCharCode.apply(null, data.subarray(sep + 1)));
          if (isFinite(value)) return value;
        }
      }
      if (type === 'IEND') break;
      pos += 12 + len;
    }
    return null;
  }

  // 空のPNGインポート。file://で開いてもCORSに引っかからないよう、fetchではなく
  // ファイル選択ダイアログ(createImageBitmap + copyExternalImageToTexture)で読み込む。
  const skyStatus = document.getElementById('skyStatus');
  const importSkyButton = document.getElementById('importSkyButton');
  const importSkyFile = document.getElementById('importSkyFile');
  importSkyButton.addEventListener('click', () => importSkyFile.click());
  importSkyFile.addEventListener('change', async () => {
    const file = importSkyFile.files[0];
    if (!file) return;
    const importedHour = readSunHourFromPng(await file.arrayBuffer());
    if (importedHour !== null) {
      sunHourInput.value = String(importedHour);
      sunHourInput.dispatchEvent(new Event('input'));
    }
    const bitmap = await createImageBitmap(file);
    envTexture.destroy();
    envTexture = createEnvTexture(bitmap.width, bitmap.height);
    envView = envTexture.createView();
    rebuildBindGroup();
    device.queue.copyExternalImageToTexture(
      { source: bitmap, flipY: false },
      { texture: envTexture },
      [bitmap.width, bitmap.height],
    );
    skyStatus.textContent = 'インポート済み (' + bitmap.width + 'x' + bitmap.height +
      (importedHour !== null ? ', 太陽の時刻 ' + formatHour(importedHour) + ' を自動設定' : ', 時刻情報なし') + ')';
    skyStatus.classList.remove('pending');
    importSkyFile.value = '';
  });

  const uniformData = new Float32Array(8);

  function frame() {
    uniformData[0] = canvas.width;
    uniformData[1] = canvas.height;
    uniformData[2] = sunHour;
    uniformData[3] = highlightRadius;
    uniformData[4] = turbidity;
    uniformData[5] = highlightIntensity;
    uniformData[6] = seaDepth;
    uniformData[7] = 0;
    device.queue.writeBuffer(uniformBuffer, 0, uniformData);

    const encoder = device.createCommandEncoder();
    const pass = encoder.beginRenderPass({
      colorAttachments: [{
        view: context.getCurrentTexture().createView(),
        clearValue: { r: 0, g: 0, b: 0, a: 1 },
        loadOp: 'clear',
        storeOp: 'store',
      }],
    });
    pass.setPipeline(tracePipeline);
    pass.setBindGroup(0, traceBindGroup);
    pass.draw(3);
    pass.end();
    device.queue.submit([encoder.finish()]);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function showError(message) {
  const el = document.getElementById('error');
  el.textContent = message;
  el.style.display = 'block';
}

main().catch((err) => {
  console.error(err);
  showError('エラーが発生しました:\n' + err.message);
});
</script>
</body>
</html>
