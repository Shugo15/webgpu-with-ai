<canvas id="gpuCanvas"></canvas>
<div id="panel">
  <div class="row">

  <div class="row">

    <button id="exportBtn">PNGとしてエクスポート</button>

    <input id="importFile" type="file" accept="image/png" style="display:none">
  </div>
  <div id="status"></div>
  <p id="note">
    equirectangular(緯度経度)テクスチャの各テクセル(=方向)に対して、大気を球殻状の層(レイリー散乱・ミー散乱・
    オゾン吸収、それぞれ高度によって密度が指数関数的/釣鐘状に変化)としてモンテカルロ・パストレーシングし、
    多重散乱まで含めて物理的に計算する。1フレームにつき1サンプルを蓄積し、フレームを重ねるほどノイズが収束する
    (これまでのCornell Box/海のシェーダーと同じ時間積分デノイズ)。収束の途中でもいつでもPNGエクスポート/インポート
    が可能。太陽の時刻を変えると蓄積はリセットされる。
  </p>
</div>

<script>
const EQUIRECT_W = 1024;
const EQUIRECT_H = 512;

const commonShaderCode = /* wgsl */ `
const PI: f32 = 3.14159265;

// --- 大気の物理定数(Bruneton & Neyretのprecomputed atmospheric scatteringモデルで
// 広く使われている値。惑星半径6360km、大気の厚さ60km、レイリー/ミー/オゾンの
// 消散係数・スケールハイトは実測に基づく代表値) ---
const PLANET_RADIUS: f32 = 6360000.0;
const ATMOSPHERE_RADIUS: f32 = 6420000.0;
const CAM_HEIGHT: f32 = 2.0;
const RAYLEIGH_SCALE_HEIGHT: f32 = 8000.0;
const MIE_SCALE_HEIGHT: f32 = 1200.0;
const RAYLEIGH_SCATTERING = vec3<f32>(5.802e-6, 13.558e-6, 33.1e-6);
const MIE_SCATTERING: f32 = 3.996e-6;
const MIE_EXTINCTION: f32 = 4.440e-6;
const MIE_G: f32 = 0.8;
const OZONE_ABSORPTION = vec3<f32>(0.650e-6, 1.881e-6, 0.085e-6);
const OZONE_CENTER_ALTITUDE: f32 = 25000.0;
const OZONE_WIDTH: f32 = 15000.0;
const SUN_INTENSITY: f32 = 15.0;

fn rayleighPhase(cosTheta: f32) -> f32 {
  return 3.0 / (16.0 * PI) * (1.0 + cosTheta * cosTheta);
}

fn miePhase(cosTheta: f32, g: f32) -> f32 {
  let g2 = g * g;
  let denom = 1.0 + g2 - 2.0 * g * cosTheta;
  return (1.0 - g2) / (4.0 * PI * pow(max(denom, 1e-4), 1.5));
}

fn hash21(p: vec2<f32>) -> f32 {
  var p3 = fract(vec3<f32>(p.x, p.y, p.x) * 0.1031);
  p3 = p3 + dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

fn tonemapGamma(color: vec3<f32>) -> vec3<f32> {
  let mapped = color / (color + vec3<f32>(1.0));
  return pow(max(mapped, vec3<f32>(0.0)), vec3<f32>(1.0 / 2.2));
}

// 方向ベクトル(y=上)からequirectangular(緯度経度)テクスチャのUVへ変換。
// u: 方位角(0..2PIを0..1に), v: 天頂からの角度(0=真上..1=真下)
fn dirToEquirectUV(dir: vec3<f32>) -> vec2<f32> {
  let phi = atan2(dir.z, dir.x);
  let theta = acos(clamp(dir.y, -1.0, 1.0));
  let u = phi / (2.0 * PI) + 0.5;
  let v = theta / PI;
  return vec2<f32>(u, v);
}

// UV(equirectangular)から方向ベクトルへの逆変換(焼き込み時に使用)
fn equirectUVToDir(uv: vec2<f32>) -> vec3<f32> {
  let phi = (uv.x - 0.5) * 2.0 * PI;
  let theta = uv.y * PI;
  let sinTheta = sin(theta);
  let y = cos(theta);
  let x = sinTheta * cos(phi);
  let z = sinTheta * sin(phi);
  return normalize(vec3<f32>(x, y, z));
}

fn hourToSunDir(hour: f32) -> vec3<f32> {
  let sunAngle = (hour - 6.0) / 12.0 * PI;
  return normalize(vec3<f32>(cos(sunAngle) * 0.35, sin(sunAngle), -0.9));
}

fn pcgHash(input: u32) -> u32 {
  var state = input * 747796405u + 2891336453u;
  var word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
  return (word >> 22u) ^ word;
}

fn rand(seed: ptr<function, u32>) -> f32 {
  *seed = pcgHash(*seed);
  return f32(*seed) / 4294967295.0;
}

fn luminance(v: vec3<f32>) -> f32 {
  return (v.x + v.y + v.z) / 3.0;
}

// 惑星中心を原点とした球との交差(t_near, t_far)。交差しなければ(-1,-1)。
fn raySphereIntersect(ro: vec3<f32>, rd: vec3<f32>, radius: f32) -> vec2<f32> {
  let b = dot(ro, rd);
  let c = dot(ro, ro) - radius * radius;
  let disc = b * b - c;
  if (disc < 0.0) {
    return vec2<f32>(-1.0, -1.0);
  }
  let sq = sqrt(disc);
  return vec2<f32>(-b - sq, -b + sq);
}

fn ozoneDensity(h: f32) -> f32 {
  return max(0.0, 1.0 - abs(h - OZONE_CENTER_ALTITUDE) / OZONE_WIDTH);
}

// 位置posでの全消散係数(散乱+吸収、波長ごと)。高度hは惑星中心からの距離から逆算する。
fn extinctionAt(pos: vec3<f32>) -> vec3<f32> {
  let h = max(length(pos) - PLANET_RADIUS, 0.0);
  let rayleigh = RAYLEIGH_SCATTERING * exp(-h / RAYLEIGH_SCALE_HEIGHT);
  let mie = vec3<f32>(MIE_EXTINCTION) * exp(-h / MIE_SCALE_HEIGHT);
  let ozone = OZONE_ABSORPTION * ozoneDensity(h);
  return rayleigh + mie + ozone;
}

// posから太陽方向への透過率(大気上端まで数値積分)。途中で地面(惑星本体)に
// 遮られる場合は0を返す。
fn computeSunTransmittance(pos: vec3<f32>, sunDir: vec3<f32>, steps: u32, stepPower: f32) -> vec3<f32> {
  let groundT = raySphereIntersect(pos, sunDir, PLANET_RADIUS);
  if (groundT.x > 0.0) {
    return vec3<f32>(0.0);
  }
  let topT = raySphereIntersect(pos, sunDir, ATMOSPHERE_RADIUS);
  let dist = max(topT.y, 0.0);
  // 主レイと同じ理由(水平線に近い太陽ほど距離が桁違いに伸びる)でu^stepPowerの非均等刻みにする
  var opticalDepth = vec3<f32>(0.0);
  for (var i = 0u; i < steps; i = i + 1u) {
    let u0 = f32(i) / f32(steps);
    let u1 = f32(i + 1u) / f32(steps);
    let tStart = dist * pow(u0, stepPower);
    let tEnd = dist * pow(u1, stepPower);
    let stepLen = tEnd - tStart;
    let samplePos = pos + sunDir * (tStart + stepLen * 0.5);
    opticalDepth += extinctionAt(samplePos) * stepLen;
  }
  return exp(-opticalDepth);
}

// Duff et al. 2017の分岐無しONB構築。単一の法線からタンジェント基底を作る。
fn buildBasis(n: vec3<f32>) -> mat3x3<f32> {
  let s = select(-1.0, 1.0, n.z >= 0.0);
  let a = -1.0 / (s + n.z);
  let b = n.x * n.y * a;
  let tangent = vec3<f32>(1.0 + s * n.x * n.x * a, s * b, -s * n.x);
  let bitangent = vec3<f32>(b, s + n.y * n.y * a, -n.y);
  return mat3x3<f32>(tangent, bitangent, n);
}

fn sampleDirectionAroundAxis(axis: vec3<f32>, cosTheta: f32, seed: ptr<function, u32>) -> vec3<f32> {
  let sinTheta = sqrt(max(0.0, 1.0 - cosTheta * cosTheta));
  let phi = 2.0 * PI * rand(seed);
  let localDir = vec3<f32>(sinTheta * cos(phi), sinTheta * sin(phi), cosTheta);
  let basis = buildBasis(axis);
  return normalize(basis * localDir);
}

// レイリー位相関数 3/(16π)(1+cosθ²) を棄却法で重点的サンプリング
fn sampleRayleighDirection(axis: vec3<f32>, seed: ptr<function, u32>) -> vec3<f32> {
  var cosTheta = 0.0;
  for (var i = 0u; i < 20u; i = i + 1u) {
    let c = 2.0 * rand(seed) - 1.0;
    let accept = (1.0 + c * c) * 0.5;
    if (rand(seed) < accept) {
      cosTheta = c;
      break;
    }
  }
  return sampleDirectionAroundAxis(axis, cosTheta, seed);
}

// Henyey-Greenstein位相関数の解析的重点的サンプリング(標準公式)
fn sampleHGDirection(axis: vec3<f32>, g: f32, seed: ptr<function, u32>) -> vec3<f32> {
  let u = rand(seed);
  var cosTheta: f32;
  if (abs(g) < 0.001) {
    cosTheta = 1.0 - 2.0 * u;
  } else {
    let sqrTerm = (1.0 - g * g) / (1.0 + g - 2.0 * g * u);
    cosTheta = (1.0 + g * g - sqrTerm * sqrTerm) / (2.0 * g);
  }
  return sampleDirectionAroundAxis(axis, cosTheta, seed);
}

// 大気を球殻の不均質な媒質として扱うモンテカルロ・ボリュームパストレーシング。
// 各バウンスで: (1)区間長を地面/大気上端との交差から決め、(2)区間内をレイマーチしながら
// 各ステップの消散率から自由行程(次の衝突点)を指数分布でサンプリングし、(3)衝突したら
// レイリー/ミー散乱/吸収のどれが起きたかを輝度加重で確率的に選び(スペクトル比はthroughputへ
// 補正として乗算)、(4)Next Event Estimationで太陽方向への直接寄与を加算し、(5)選んだ位相関数から
// 次方向を重点的サンプリングして継続する。
fn traceSkyPrecise(dirIn: vec3<f32>, sunDir: vec3<f32>, maxBounces: u32, seedIn: u32, raymarchSteps: u32, stepPower: f32) -> vec3<f32> {
  var seed = seedIn;
  var pos = vec3<f32>(0.0, PLANET_RADIUS + CAM_HEIGHT, 0.0);
  var rayDir = dirIn;
  var throughput = vec3<f32>(1.0, 1.0, 1.0);
  var radiance = vec3<f32>(0.0, 0.0, 0.0);

  for (var bounce = 0u; bounce < maxBounces; bounce = bounce + 1u) {
    let groundT = raySphereIntersect(pos, rayDir, PLANET_RADIUS);
    let topT = raySphereIntersect(pos, rayDir, ATMOSPHERE_RADIUS);
    var segEnd: f32;
    var hitsGround: bool;
    if (groundT.x > 0.0) {
      segEnd = groundT.x;
      hitsGround = true;
    } else {
      segEnd = max(topT.y, 0.0);
      hitsGround = false;
    }

    // 水平線に近い(=仰角が小さい)視線ほどsegEndが桁違いに長くなる(真上: 数十km,
    // 水平: 数百km)。均等刻みだと水平線付近でステップ幅が大気の密度変化のスケール
    // (レイリー8km, ミー1.2km)を大きく超えてしまい、積分が破綻する。
    // u(0..1)をu^stepPowerで再パラメータ化してカメラに近い側を密に、遠い側を粗く刻む
    // (stepPower=1で均等刻み、大きいほどカメラ近くに偏る)。
    let numSteps = raymarchSteps;
    var collided = false;
    var collidePos = pos + rayDir * segEnd;

    for (var i = 0u; i < numSteps; i = i + 1u) {
      let u0 = f32(i) / f32(numSteps);
      let u1 = f32(i + 1u) / f32(numSteps);
      let tStart = segEnd * pow(u0, stepPower);
      let tEnd = segEnd * pow(u1, stepPower);
      let stepLen = tEnd - tStart;
      let midPos = pos + rayDir * (tStart + stepLen * 0.5);
      let extLum = max(luminance(extinctionAt(midPos)), 1e-8);
      let collideProb = 1.0 - exp(-extLum * stepLen);
      if (rand(&seed) < collideProb) {
        let u = rand(&seed);
        let subT = -log(1.0 - u * collideProb) / extLum;
        collidePos = pos + rayDir * (tStart + subT);
        collided = true;
        break;
      }
    }

    if (!collided) {
      if (hitsGround) {
        radiance += throughput * vec3<f32>(0.02, 0.02, 0.025);
      } else {
        // 太陽円盤そのものは、まだ一度も散乱していないカメラの主レイ(bounce==0)でだけ加算する。
        // 散乱後(bounce>0)は、各衝突点で既にNext Event Estimationにより太陽への直接寄与を
        // 明示的に加算済みなので、そこでランダムに選んだ続きの方向がたまたま太陽の位置と
        // 一致した場合にも同じ寄与を二重に数えてしまうと、稀にしか起きない代わりに大きな値を
        // 持つ「ホタル」ノイズの主因になる(サンプル数を増やすほど新しいホタルが出現する頻度が
        // 増え、むしろノイズが目立って見える)。
        if (bounce == 0u) {
          let cosSun = dot(rayDir, sunDir);
          let sunDisc = smoothstep(cos(0.02), cos(0.009), cosSun);
          radiance += throughput * vec3<f32>(1.0, 0.98, 0.92) * sunDisc * SUN_INTENSITY;
        }
        let isNight = smoothstep(0.05, -0.15, sunDir.y);
        let starField = step(0.997, hash21(floor(rayDir.xz * 400.0))) * hash21(rayDir.xy * 123.4);
        radiance += throughput * vec3<f32>(starField) * isNight * 0.5;
      }
      break;
    }

    let h = max(length(collidePos) - PLANET_RADIUS, 0.0);
    let rayleighScatter = RAYLEIGH_SCATTERING * exp(-h / RAYLEIGH_SCALE_HEIGHT);
    let mieScatter = vec3<f32>(MIE_SCATTERING) * exp(-h / MIE_SCALE_HEIGHT);
    let mieAbsorb = vec3<f32>(MIE_EXTINCTION - MIE_SCATTERING) * exp(-h / MIE_SCALE_HEIGHT);
    let ozoneAbsorb = OZONE_ABSORPTION * ozoneDensity(h);

    let wRayleigh = luminance(rayleighScatter);
    let wMie = luminance(mieScatter);
    let wAbsorb = luminance(mieAbsorb) + luminance(ozoneAbsorb);
    let wTotal = max(wRayleigh + wMie + wAbsorb, 1e-8);

    let pick = rand(&seed) * wTotal;
    if (pick > wRayleigh + wMie) {
      break; // 吸収されて終端
    }

    var isRayleigh = true;
    if (pick < wRayleigh) {
      throughput *= rayleighScatter / max(wRayleigh, 1e-8);
      isRayleigh = true;
    } else {
      throughput *= mieScatter / max(wMie, 1e-8);
      isRayleigh = false;
    }

    let cosToSun = dot(rayDir, sunDir);
    var phaseToSun: f32;
    if (isRayleigh) {
      phaseToSun = rayleighPhase(cosToSun);
    } else {
      phaseToSun = miePhase(cosToSun, MIE_G);
    }
    let transmittanceToSun = computeSunTransmittance(collidePos, sunDir, max(raymarchSteps / 2u, 4u), stepPower);
    radiance += throughput * phaseToSun * transmittanceToSun * SUN_INTENSITY;

    var newDir: vec3<f32>;
    if (isRayleigh) {
      newDir = sampleRayleighDirection(rayDir, &seed);
    } else {
      newDir = sampleHGDirection(rayDir, MIE_G, &seed);
    }

    pos = collidePos;
    rayDir = newDir;
  }

  return radiance;
}
`;

const vertexShaderCode = /* wgsl */ `
@vertex
fn vs_main(@builtin(vertex_index) vertexIndex: u32) -> @builtin(position) vec4<f32> {
  var pos = array<vec2<f32>, 3>(
    vec2<f32>(-1.0, -1.0),
    vec2<f32>( 3.0, -1.0),
    vec2<f32>(-1.0,  3.0)
  );
  return vec4<f32>(pos[vertexIndex], 0.0, 1.0);
}
`;

// 蓄積パス: equirectangularテクスチャの各テクセルにつき1サンプルのパストレースを行い、
// 前フレームまでの平均(prevAccumTex)と合わせて時間方向の累積平均を更新する(HDR, rgba16float)。
const traceShaderCode = commonShaderCode + vertexShaderCode + /* wgsl */ `
struct TraceUniforms {
  sunHour: f32,
  frameIndex: f32,
  maxBounces: f32,
  raymarchSteps: f32,
  stepPower: f32,
  _pad0: f32,
  _pad1: f32,
  _pad2: f32,
};
@group(0) @binding(0) var<uniform> traceUniforms: TraceUniforms;
@group(0) @binding(1) var prevAccumTex: texture_2d<f32>;

@fragment
fn fs_trace(@builtin(position) fragCoord: vec4<f32>) -> @location(0) vec4<f32> {
  let texelIndex = u32(fragCoord.x) + u32(fragCoord.y) * ${EQUIRECT_W}u;
  var seed = texelIndex * 9781u + u32(traceUniforms.frameIndex) * 6271u + 1u;

  // テクセル内でサブピクセル位置をランダムにジッターさせる。フレームを重ねるほど
  // テクセルのfootprint全体を平均化することになり(時間積分によるスーパーサンプリング)、
  // テクセル中心の1方向だけを固定サンプリングすることで生じるエイリアシング/バンディングを防ぐ。
  let jitter = vec2<f32>(rand(&seed) - 0.5, rand(&seed) - 0.5) / vec2<f32>(${EQUIRECT_W}.0, ${EQUIRECT_H}.0);
  let uv = fragCoord.xy / vec2<f32>(${EQUIRECT_W}.0, ${EQUIRECT_H}.0) + jitter;
  let dir = equirectUVToDir(uv);
  let sunDir = hourToSunDir(traceUniforms.sunHour);

  let sampleColor = traceSkyPrecise(dir, sunDir, u32(traceUniforms.maxBounces), seed, u32(traceUniforms.raymarchSteps), traceUniforms.stepPower);

  let prev = textureLoad(prevAccumTex, vec2<i32>(i32(fragCoord.x), i32(fragCoord.y)), 0).rgb;
  let n = traceUniforms.frameIndex + 1.0;
  let newAvg = prev + (sampleColor - prev) / n;
  return vec4<f32>(newAvg, 1.0);
}
`;

// 直接計算パス: equirectangularテクスチャに焼き込んでからサンプリングするのではなく、
// 画面の各ピクセルについてカメラのレイ方向を直接求めてパストレーシングする(低解像度な
// テクスチャの補間による見え方の違いなのか、それとも本物の現象なのかを見比べるための検証用)。
const directTraceShaderCode = commonShaderCode + vertexShaderCode + /* wgsl */ `
struct DirectTraceUniforms {
  resAndSun: vec4<f32>, // xy=解像度, z=太陽の時刻, w=フレーム数
  params: vec4<f32>,    // x=最大散乱回数, y=レイマーチステップ数, z=ステップ幅の偏り(stepPower)
};
@group(0) @binding(0) var<uniform> directUniforms: DirectTraceUniforms;
@group(0) @binding(1) var prevDirectTex: texture_2d<f32>;

@fragment
fn fs_directTrace(@builtin(position) fragCoord: vec4<f32>) -> @location(0) vec4<f32> {
  let res = directUniforms.resAndSun.xy;
  let sunDir = hourToSunDir(directUniforms.resAndSun.z);
  let frameIndex = directUniforms.resAndSun.w;
  let maxBounces = u32(directUniforms.params.x);

  let pixelIndex = u32(fragCoord.x) + u32(fragCoord.y) * u32(res.x);
  var seed = pixelIndex * 9781u + u32(frameIndex) * 6271u + 1u;

  // ピクセル内でサブピクセル位置をジッターさせ、フレームを重ねるほどピクセルの
  // footprint全体を平均化する(fs_traceと同じアンチエイリアシング)
  let jitter = vec2<f32>(rand(&seed) - 0.5, rand(&seed) - 0.5);
  let ndc = (fragCoord.xy + jitter - 0.5 * res) / res.y;

  let forward = normalize(vec3<f32>(0.0, 0.35, -1.0));
  let worldUp = vec3<f32>(0.0, 1.0, 0.0);
  let right = normalize(cross(forward, worldUp));
  let up = cross(right, forward);
  let fov = 1.5;
  let dir = normalize(forward + right * ndc.x * fov - up * ndc.y * fov);

  let raymarchSteps = u32(directUniforms.params.y);
  let stepPower = directUniforms.params.z;
  let sampleColor = traceSkyPrecise(dir, sunDir, maxBounces, seed, raymarchSteps, stepPower);

  let prev = textureLoad(prevDirectTex, vec2<i32>(i32(fragCoord.x), i32(fragCoord.y)), 0).rgb;
  let n = frameIndex + 1.0;
  let newAvg = prev + (sampleColor - prev) / n;
  return vec4<f32>(newAvg, 1.0);
}
`;

// 解決パス: HDRの蓄積テクスチャをトーンマップ+ガンマ補正してLDR(rgba8unorm)に変換する。
// このLDRテクスチャが表示用サンプリング・PNGエクスポート・PNGインポートの共通の場になる。
const resolveShaderCode = vertexShaderCode + /* wgsl */ `
fn tonemapGamma(color: vec3<f32>) -> vec3<f32> {
  let mapped = color / (color + vec3<f32>(1.0));
  return pow(max(mapped, vec3<f32>(0.0)), vec3<f32>(1.0 / 2.2));
}

@group(0) @binding(0) var resolveSrcTex: texture_2d<f32>;

@fragment
fn fs_resolve(@builtin(position) fragCoord: vec4<f32>) -> @location(0) vec4<f32> {
  let hdr = textureLoad(resolveSrcTex, vec2<i32>(i32(fragCoord.x), i32(fragCoord.y)), 0).rgb;
  return vec4<f32>(tonemapGamma(hdr), 1.0);
}
`;

// 表示パス: カメラのレイ方向をequirectangular UVに変換し、解決済みLDRテクスチャをサンプリングするだけ。
const displayShaderCode = commonShaderCode + vertexShaderCode + /* wgsl */ `
struct DisplayUniforms {
  iResolution: vec2<f32>,
  sunHour: f32,
  debugMode: f32, // 0=通常 1=輝度ヒートマップ 2=散乱角ヒートマップ 3=HG位相関数分母(denom)ヒートマップ
};
@group(0) @binding(0) var<uniform> displayUniforms: DisplayUniforms;
@group(0) @binding(1) var equirectTex: texture_2d<f32>;
@group(0) @binding(2) var equirectSampler: sampler;

// 黒->青->緑->黄->赤の簡易サーモカラー(0..1を疑似カラーに変換、デバッグ表示用)
fn heatColor(t: f32) -> vec3<f32> {
  var stops = array<vec3<f32>, 5>(
    vec3<f32>(0.0, 0.0, 0.0),
    vec3<f32>(0.0, 0.0, 1.0),
    vec3<f32>(0.0, 1.0, 0.0),
    vec3<f32>(1.0, 1.0, 0.0),
    vec3<f32>(1.0, 0.0, 0.0),
  );
  let x = clamp(t, 0.0, 1.0) * 4.0;
  let i = min(u32(x), 3u);
  let frac = x - f32(i);
  return mix(stops[i], stops[i + 1u], frac);
}

@fragment
fn fs_display(@builtin(position) fragCoord: vec4<f32>) -> @location(0) vec4<f32> {
  let res = displayUniforms.iResolution;
  let ndc = (fragCoord.xy - 0.5 * res) / res.y;

  let forward = normalize(vec3<f32>(0.0, 0.35, -1.0));
  let worldUp = vec3<f32>(0.0, 1.0, 0.0);
  let right = normalize(cross(forward, worldUp));
  let up = cross(right, forward);
  let fov = 1.5;
  let dir = normalize(forward + right * ndc.x * fov - up * ndc.y * fov);

  let mode = i32(displayUniforms.debugMode);
  if (mode == 1) {
    let uv = dirToEquirectUV(dir);
    let col = textureSampleLevel(equirectTex, equirectSampler, uv, 0.0).rgb;
    let lum = (col.r + col.g + col.b) / 3.0;
    return vec4<f32>(heatColor(lum), 1.0);
  }
  if (mode == 2 || mode == 3) {
    let sunDir = hourToSunDir(displayUniforms.sunHour);
    let cosAngle = clamp(dot(dir, sunDir), -1.0, 1.0);
    if (mode == 2) {
      // 散乱角(太陽方向との角度)0°(赤)〜180°(黒)
      let angle = acos(cosAngle);
      return vec4<f32>(heatColor(1.0 - angle / PI), 1.0);
    }
    // HG位相関数の分母 1+g^2-2g*cosTheta を [(1-g)^2, (1+g)^2] で正規化して疑似カラー化
    let g = MIE_G;
    let denom = 1.0 + g * g - 2.0 * g * cosAngle;
    let denomMin = (1.0 - g) * (1.0 - g);
    let denomMax = (1.0 + g) * (1.0 + g);
    let t = (denom - denomMin) / (denomMax - denomMin);
    return vec4<f32>(heatColor(1.0 - t), 1.0);
  }

  let uv = dirToEquirectUV(dir);
  let sampled = textureSampleLevel(equirectTex, equirectSampler, uv, 0.0).rgb;
  return vec4<f32>(sampled, 1.0);
}
`;

async function main() {
  const canvas = document.getElementById('gpuCanvas');
  const statusEl = document.getElementById('status');

  if (!navigator.gpu) {
    showError('このブラウザはWebGPUに対応していません。\nChrome/Edge の最新版などでお試しください。');
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    showError('WebGPUアダプタの取得に失敗しました。');
    return;
  }
  const device = await adapter.requestDevice();
  device.lost.then((info) => console.log('WebGPU device lost:', info.reason, info.message));

  const context = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const cssSize = Math.min(window.innerWidth, window.innerHeight * (7 / 10));
    const size = Math.max(1, Math.floor(cssSize * dpr));
    canvas.width = size;
    canvas.height = size;
    context.configure({ device, format, alphaMode: 'opaque' });
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const accumFormat = 'rgba16float';

  // --- HDR蓄積テクスチャ(ping-pong) ---
  let accumTexA = device.createTexture({
    size: [EQUIRECT_W, EQUIRECT_H],
    format: accumFormat,
    usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING,
  });
  let accumTexB = device.createTexture({
    size: [EQUIRECT_W, EQUIRECT_H],
    format: accumFormat,
    usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING,
  });
  let accumViewA = accumTexA.createView();
  let accumViewB = accumTexB.createView();

  // --- 表示/エクスポート/インポート共通のLDRテクスチャ ---
  let equirectTexture = device.createTexture({
    size: [EQUIRECT_W, EQUIRECT_H],
    format: 'rgba8unorm',
    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT |
           GPUTextureUsage.COPY_SRC | GPUTextureUsage.COPY_DST,
  });
  const equirectSampler = device.createSampler({
    magFilter: 'linear',
    minFilter: 'linear',
    addressModeU: 'repeat',
    addressModeV: 'clamp-to-edge',
  });

  // --- 蓄積(パストレース)パイプライン ---
  const traceModule = device.createShaderModule({ code: traceShaderCode });
  const tracePipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: traceModule, entryPoint: 'vs_main' },
    fragment: { module: traceModule, entryPoint: 'fs_trace', targets: [{ format: accumFormat }] },
    primitive: { topology: 'triangle-list' },
  });
  const traceUniformBuffer = device.createBuffer({
    size: 32,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });
  const traceBindGroupSrcA = device.createBindGroup({
    layout: tracePipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: traceUniformBuffer } },
      { binding: 1, resource: accumViewA },
    ],
  });
  const traceBindGroupSrcB = device.createBindGroup({
    layout: tracePipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: traceUniformBuffer } },
      { binding: 1, resource: accumViewB },
    ],
  });

  // --- 解決(トーンマップ)パイプライン ---
  const resolveModule = device.createShaderModule({ code: resolveShaderCode });
  const resolvePipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: resolveModule, entryPoint: 'vs_main' },
    fragment: { module: resolveModule, entryPoint: 'fs_resolve', targets: [{ format: 'rgba8unorm' }] },
    primitive: { topology: 'triangle-list' },
  });
  const resolveBindGroupFromA = device.createBindGroup({
    layout: resolvePipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: accumViewA }],
  });
  const resolveBindGroupFromB = device.createBindGroup({
    layout: resolvePipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: accumViewB }],
  });

  // --- 表示パイプライン ---
  const displayModule = device.createShaderModule({ code: displayShaderCode });
  const displayPipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: displayModule, entryPoint: 'vs_main' },
    fragment: { module: displayModule, entryPoint: 'fs_display', targets: [{ format }] },
    primitive: { topology: 'triangle-list' },
  });
  const displayUniformBuffer = device.createBuffer({
    size: 16,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });
  function makeDisplayBindGroup() {
    return device.createBindGroup({
      layout: displayPipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: displayUniformBuffer } },
        { binding: 1, resource: equirectTexture.createView() },
        { binding: 2, resource: equirectSampler },
      ],
    });
  }
  let displayBindGroup = makeDisplayBindGroup();

  // --- 直接計算(検証用)パイプライン: equirectテクスチャを介さず、画面解像度のまま
  // カメラのレイ方向で直接パストレーシングする。低解像度テクスチャの補間による
  // 見え方の違いなのか、本物の現象なのかを見比べるためのもの。 ---
  const directTraceModule = device.createShaderModule({ code: directTraceShaderCode });
  const directTracePipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: directTraceModule, entryPoint: 'vs_main' },
    fragment: { module: directTraceModule, entryPoint: 'fs_directTrace', targets: [{ format: accumFormat }] },
    primitive: { topology: 'triangle-list' },
  });
  const directTraceUniformBuffer = device.createBuffer({
    size: 32,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });
  // 解決(トーンマップ)は既存のresolveModuleを再利用しつつ、出力先だけcanvasのフォーマットにする
  const directResolvePipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: resolveModule, entryPoint: 'vs_main' },
    fragment: { module: resolveModule, entryPoint: 'fs_resolve', targets: [{ format }] },
    primitive: { topology: 'triangle-list' },
  });

  let directAccumTexA = null, directAccumTexB = null;
  let directAccumViewA = null, directAccumViewB = null;
  let directTraceBindGroupSrcA = null, directTraceBindGroupSrcB = null;
  let directResolveBindGroupFromA = null, directResolveBindGroupFromB = null;
  let directFrameIndex = 0;

  function createDirectAccumTextures(width, height) {
    if (directAccumTexA) directAccumTexA.destroy();
    if (directAccumTexB) directAccumTexB.destroy();
    directAccumTexA = device.createTexture({
      size: [width, height],
      format: accumFormat,
      usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING,
    });
    directAccumTexB = device.createTexture({
      size: [width, height],
      format: accumFormat,
      usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING,
    });
    directAccumViewA = directAccumTexA.createView();
    directAccumViewB = directAccumTexB.createView();
    directTraceBindGroupSrcA = device.createBindGroup({
      layout: directTracePipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: directTraceUniformBuffer } },
        { binding: 1, resource: directAccumViewA },
      ],
    });
    directTraceBindGroupSrcB = device.createBindGroup({
      layout: directTracePipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: directTraceUniformBuffer } },
        { binding: 1, resource: directAccumViewB },
      ],
    });
    directResolveBindGroupFromA = device.createBindGroup({
      layout: directResolvePipeline.getBindGroupLayout(0),
      entries: [{ binding: 0, resource: directAccumViewA }],
    });
    directResolveBindGroupFromB = device.createBindGroup({
      layout: directResolvePipeline.getBindGroupLayout(0),
      entries: [{ binding: 0, resource: directAccumViewB }],
    });
    directFrameIndex = 0;
  }
  createDirectAccumTextures(canvas.width, canvas.height);
  window.addEventListener('resize', () => createDirectAccumTextures(canvas.width, canvas.height));

  let sunHour = 10.0;
  let maxBounces = 4;
  let raymarchSteps = 24;
  let stepPower = 2.0;
  let frameIndex = 0;
  let liveMode = true; // false: PNGインポート直後で表示が固定されている状態
  let debugMode = 0; // 0=通常 1=輝度ヒートマップ 2=散乱角ヒートマップ 3=denomヒートマップ
  let directMode = false; // true: equirectテクスチャを介さず画面解像度で直接計算

  function formatHour(h) {
    const hh = Math.floor(h);
    const mm = Math.round((h - hh) * 60);
    return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  const sunHourInput = document.getElementById('sunHour');
  const sunHourVal = document.getElementById('sunHourVal');
  sunHourInput.addEventListener('input', () => {
    sunHour = parseFloat(sunHourInput.value);
    sunHourVal.textContent = formatHour(sunHour);
  });

  const maxBouncesInput = document.getElementById('maxBounces');
  const maxBouncesVal = document.getElementById('maxBouncesVal');
  maxBouncesInput.addEventListener('input', () => {
    maxBounces = parseInt(maxBouncesInput.value, 10);
    maxBouncesVal.textContent = String(maxBounces);
  });

  const raymarchStepsInput = document.getElementById('raymarchSteps');
  const raymarchStepsVal = document.getElementById('raymarchStepsVal');
  raymarchStepsInput.addEventListener('input', () => {
    raymarchSteps = parseInt(raymarchStepsInput.value, 10);
    raymarchStepsVal.textContent = String(raymarchSteps);
  });

  const stepPowerInput = document.getElementById('stepPower');
  const stepPowerVal = document.getElementById('stepPowerVal');
  stepPowerInput.addEventListener('input', () => {
    stepPower = parseFloat(stepPowerInput.value);
    stepPowerVal.textContent = stepPower.toFixed(1);
  });

  document.getElementById('debugMode').addEventListener('change', (e) => {
    debugMode = parseInt(e.target.value, 10);
  });

  document.getElementById('directMode').addEventListener('change', (e) => {
    directMode = e.target.checked;
    directFrameIndex = 0;
  });

  document.getElementById('bakeBtn').addEventListener('click', () => {
    frameIndex = 0;
    directFrameIndex = 0;
    liveMode = true;
    setStatus('太陽の時刻 ' + formatHour(sunHour) + ' で焼き込みを開始しました');
  });

  document.getElementById('exportBtn').addEventListener('click', async () => {
    setStatus('エクスポート中...');
    const bytesPerRow = EQUIRECT_W * 4;
    const buffer = device.createBuffer({
      size: bytesPerRow * EQUIRECT_H,
      usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
    });
    const encoder = device.createCommandEncoder();
    encoder.copyTextureToBuffer(
      { texture: equirectTexture },
      { buffer, bytesPerRow },
      [EQUIRECT_W, EQUIRECT_H],
    );
    device.queue.submit([encoder.finish()]);
    await buffer.mapAsync(GPUMapMode.READ);
    const pixels = new Uint8ClampedArray(buffer.getMappedRange().slice(0));
    buffer.unmap();
    buffer.destroy();

    const offscreen = document.createElement('canvas');
    offscreen.width = EQUIRECT_W;
    offscreen.height = EQUIRECT_H;
    const ctx2d = offscreen.getContext('2d');
    const imageData = new ImageData(pixels, EQUIRECT_W, EQUIRECT_H);
    ctx2d.putImageData(imageData, 0, 0);

    offscreen.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sky-equirect.png';
      a.click();
      URL.revokeObjectURL(url);
      setStatus('sky-equirect.png をエクスポートしました (サンプル数 ' + frameIndex + ')');
    }, 'image/png');
  });

  const importFileInput = document.getElementById('importFile');
  document.getElementById('importBtn').addEventListener('click', () => importFileInput.click());
  importFileInput.addEventListener('change', async () => {
    const file = importFileInput.files[0];
    if (!file) return;
    setStatus('インポート中...');
    const bitmap = await createImageBitmap(file);

    if (bitmap.width !== equirectTexture.width || bitmap.height !== equirectTexture.height) {
      equirectTexture.destroy();
      equirectTexture = device.createTexture({
        size: [bitmap.width, bitmap.height],
        format: 'rgba8unorm',
        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT |
               GPUTextureUsage.COPY_SRC | GPUTextureUsage.COPY_DST,
      });
      displayBindGroup = makeDisplayBindGroup();
    }

    device.queue.copyExternalImageToTexture(
      { source: bitmap, flipY: false },
      { texture: equirectTexture },
      [bitmap.width, bitmap.height],
    );
    liveMode = false; // 次にリセットして焼き込みを開始するまで、インポートした内容を固定表示する
    setStatus('sky-equirect.png をインポートしました (' + bitmap.width + 'x' + bitmap.height + ')');
    importFileInput.value = '';
  });

  function frame() {
    const encoder = device.createCommandEncoder();

    if (directMode) {
      // equirectテクスチャを介さず、画面解像度のまま直接パストレーシングして蓄積する
      const directData = new Float32Array([canvas.width, canvas.height, sunHour, directFrameIndex, maxBounces, raymarchSteps, stepPower, 0]);
      device.queue.writeBuffer(directTraceUniformBuffer, 0, directData);

      const srcIsA = directFrameIndex % 2 === 0;
      const directTraceBindGroup = srcIsA ? directTraceBindGroupSrcA : directTraceBindGroupSrcB;
      const directDstView = srcIsA ? directAccumViewB : directAccumViewA;
      const directResolveBindGroup = srcIsA ? directResolveBindGroupFromB : directResolveBindGroupFromA;

      const directTracePass = encoder.beginRenderPass({
        colorAttachments: [{
          view: directDstView,
          clearValue: { r: 0, g: 0, b: 0, a: 1 },
          loadOp: 'clear',
          storeOp: 'store',
        }],
      });
      directTracePass.setPipeline(directTracePipeline);
      directTracePass.setBindGroup(0, directTraceBindGroup);
      directTracePass.draw(3);
      directTracePass.end();

      const directResolvePass = encoder.beginRenderPass({
        colorAttachments: [{
          view: context.getCurrentTexture().createView(),
          clearValue: { r: 0, g: 0, b: 0, a: 1 },
          loadOp: 'clear',
          storeOp: 'store',
        }],
      });
      directResolvePass.setPipeline(directResolvePipeline);
      directResolvePass.setBindGroup(0, directResolveBindGroup);
      directResolvePass.draw(3);
      directResolvePass.end();

      directFrameIndex += 1;
      setStatus('直接計算で蓄積中... サンプル数 ' + directFrameIndex + ' (太陽の時刻 ' + formatHour(sunHour) + ')');

      device.queue.submit([encoder.finish()]);
      requestAnimationFrame(frame);
      return;
    }

    if (liveMode) {
      const traceData = new Float32Array([sunHour, frameIndex, maxBounces, raymarchSteps, stepPower, 0, 0, 0]);
      device.queue.writeBuffer(traceUniformBuffer, 0, traceData);

      const srcIsA = frameIndex % 2 === 0;
      const traceBindGroup = srcIsA ? traceBindGroupSrcA : traceBindGroupSrcB;
      const dstView = srcIsA ? accumViewB : accumViewA;
      const resolveBindGroup = srcIsA ? resolveBindGroupFromB : resolveBindGroupFromA;

      const tracePass = encoder.beginRenderPass({
        colorAttachments: [{
          view: dstView,
          clearValue: { r: 0, g: 0, b: 0, a: 1 },
          loadOp: 'clear',
          storeOp: 'store',
        }],
      });
      tracePass.setPipeline(tracePipeline);
      tracePass.setBindGroup(0, traceBindGroup);
      tracePass.draw(3);
      tracePass.end();

      const resolvePass = encoder.beginRenderPass({
        colorAttachments: [{
          view: equirectTexture.createView(),
          clearValue: { r: 0, g: 0, b: 0, a: 1 },
          loadOp: 'clear',
          storeOp: 'store',
        }],
      });
      resolvePass.setPipeline(resolvePipeline);
      resolvePass.setBindGroup(0, resolveBindGroup);
      resolvePass.draw(3);
      resolvePass.end();

      frameIndex += 1;
      setStatus('蓄積中... サンプル数 ' + frameIndex + ' (太陽の時刻 ' + formatHour(sunHour) + ')');
    }

    const displayData = new Float32Array([canvas.width, canvas.height, sunHour, debugMode]);
    device.queue.writeBuffer(displayUniformBuffer, 0, displayData);

    const displayPass = encoder.beginRenderPass({
      colorAttachments: [{
        view: context.getCurrentTexture().createView(),
        clearValue: { r: 0, g: 0, b: 0, a: 1 },
        loadOp: 'clear',
        storeOp: 'store',
      }],
    });
    displayPass.setPipeline(displayPipeline);
    displayPass.setBindGroup(0, displayBindGroup);
    displayPass.draw(3);
    displayPass.end();

    device.queue.submit([encoder.finish()]);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function showError(message) {
  const el = document.getElementById('error');
  el.textContent = message;
  el.style.display = 'block';
}

main().catch((err) => {
  console.error(err);
  showError('エラーが発生しました:\n' + err.message);
});
</script>
