<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>海(ガーストナー波・鏡面反射) - WebGPU Shader Playground</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    width: min(100vw, 100vh);
    height: min(100vw, 100vh);
  }
  #back {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 10;
    color: #fff;
    background: rgba(0, 0, 0, 0.5);
    font-family: system-ui, sans-serif;
    font-size: 0.9rem;
    text-decoration: none;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
  }
  #back:hover {
    background: rgba(0, 0, 0, 0.75);
  }
  #panel {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 10;
    color: #eee;
    background: rgba(0, 0, 0, 0.55);
    font-family: system-ui, sans-serif;
    font-size: 0.8rem;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    min-width: 220px;
  }
  #panel .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  #panel label {
    flex: 1;
  }
  #panel input[type="range"] {
    flex: 1;
  }
  #panel .val {
    width: 3.5em;
    text-align: right;
  }
  #panel .row + .row {
    margin-top: 0.5rem;
  }
  #panel input[type="color"] {
    width: 2.2em;
    height: 1.4em;
    padding: 0;
    border: none;
    background: none;
  }
  #panel button {
    flex: 1;
    color: #eee;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    padding: 0.3rem 0.6rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  #panel button:hover {
    background: rgba(255, 255, 255, 0.2);
  }
  #error {
    display: none;
    position: fixed;
    inset: 0;
    color: #fff;
    background: #111;
    font-family: system-ui, sans-serif;
    padding: 2rem;
    box-sizing: border-box;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<a id="back" href="../index.html">&larr; 一覧に戻る</a>
<div id="panel">
  <div class="row">
    <label for="sunHour">太陽の時刻</label>
    <input id="sunHour" type="range" min="0" max="24" step="0.1" value="10">
    <span class="val" id="sunHourVal">10:00</span>
  </div>
  <div class="row">
    <button id="pauseButton" type="button">一時停止</button>
  </div>
  <div class="row">
    <label for="reflectionCount">反射回数</label>
    <input id="reflectionCount" type="range" min="1" max="5" step="1" value="2">
    <span class="val" id="reflectionCountVal">2</span>
  </div>
  <div class="row">
    <label for="waterColor">水の色(透過)</label>
    <input id="waterColor" type="color" value="#0d3a45">
  </div>
  <div class="row">
    <label for="debugHighlight">失敗箇所を強調表示</label>
    <input id="debugHighlight" type="checkbox">
  </div>
  <div class="row">
    <label for="debugColor">強調表示の色</label>
    <input id="debugColor" type="color" value="#ff00ff">
  </div>
</div>
<canvas id="gpuCanvas"></canvas>
<div id="error"></div>

<script>
// 海面をガーストナー波(トロコイド変位)で表現し、透過なしの鏡面反射として
// 空の色(前回の大気散乱近似と同じモデル)を映り込ませるだけのシンプルな海。
// レイマーチングはせず、水平な基準面との交点(x,z)でガーストナー法線を解析的に
// 求めて反射方向を決めるので、こちらも1ピクセル1回の計算で済む高速な近似。
const shaderCode = /* wgsl */ `
struct Uniforms {
  resAndTime: vec4<f32>, // xy = resolution, z = iTime(波のアニメーションのみ), w = sunHour(太陽の時刻)
  params: vec4<f32>,     // x = maxBounces, y = debugMode(0/1), z/w未使用
  debugColor: vec4<f32>, // rgb = 強調表示の色, aは未使用
  waterColor: vec4<f32>, // rgb = フレネル透過成分の色(水そのものの色), aは未使用
};
@group(0) @binding(0) var<uniform> uniforms: Uniforms;

@vertex
fn vs_main(@builtin(vertex_index) vertexIndex: u32) -> @builtin(position) vec4<f32> {
  var pos = array<vec2<f32>, 3>(
    vec2<f32>(-1.0, -1.0),
    vec2<f32>( 3.0, -1.0),
    vec2<f32>(-1.0,  3.0)
  );
  return vec4<f32>(pos[vertexIndex], 0.0, 1.0);
}

const PI: f32 = 3.14159265;

fn rayleighPhase(cosTheta: f32) -> f32 {
  return 3.0 / (16.0 * PI) * (1.0 + cosTheta * cosTheta);
}

fn miePhase(cosTheta: f32, g: f32) -> f32 {
  let g2 = g * g;
  let denom = 1.0 + g2 - 2.0 * g * cosTheta;
  return (1.0 - g2) / (4.0 * PI * pow(max(denom, 1e-4), 1.5));
}

fn hash21(p: vec2<f32>) -> f32 {
  var p3 = fract(vec3<f32>(p.x, p.y, p.x) * 0.1031);
  p3 = p3 + dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

// 空気の層をどれだけ通過するか(光路長)を、水平線に近いほど長くなる
// 単純な指数関数(1/仰角)で近似する(shaders/analytic-sky.htmlと同じモデル)。
fn skyColor(dir: vec3<f32>, sunDir: vec3<f32>) -> vec3<f32> {
  let cosTheta = dot(dir, sunDir);

  let rayleighCoeff = vec3<f32>(0.1, 0.5, 2.0);
  let mieCoeff = 0.12;
  let mieG = 0.82;
  let opticalScale = 0.15;

  let sunVisibility = smoothstep(-0.12, 0.06, sunDir.y);

  if (dir.y < 0.0) {
    let hazeColor = vec3<f32>(0.55, 0.5, 0.45) * sunVisibility;
    let groundColor = vec3<f32>(0.02, 0.02, 0.025);
    return mix(hazeColor, groundColor, smoothstep(0.0, -0.25, dir.y));
  }

  let viewElevation = max(dir.y, 0.02);
  let viewExtinction = exp(-(1.0 / viewElevation) * (rayleighCoeff + vec3<f32>(mieCoeff)) * opticalScale);

  let sunElevation = max(sunDir.y, 0.02);
  let sunTransmittance = exp(-(1.0 / sunElevation) * (rayleighCoeff + vec3<f32>(mieCoeff)) * opticalScale);

  let rayleighInscatter = rayleighCoeff * rayleighPhase(cosTheta);
  let mieInscatter = vec3<f32>(mieCoeff) * miePhase(cosTheta, mieG);
  let inscatter = (rayleighInscatter + mieInscatter) * viewExtinction * sunTransmittance;

  var col = inscatter * sunVisibility * 10.0;

  let sunDisc = smoothstep(0.9995, 0.9999, cosTheta) * sunVisibility;
  col += sunTransmittance * sunDisc * 8.0;

  let night = 1.0 - sunVisibility;
  let starField = step(0.997, hash21(floor(dir.xz * 400.0))) * hash21(dir.xy * 123.4);
  col += vec3<f32>(starField) * night;
  col += vec3<f32>(0.008, 0.012, 0.025) * night;

  return col;
}

const NUM_WAVES: u32 = 5u;

// ガーストナー波(トロコイド波)の法線"と"実際の高さ(垂直変位)を1回のループで
// まとめて求める。戻り値はxyz=法線, w=高さ。
// (以前は法線しか計算しておらず、水平な基準面との交点をそのまま反射点として
// 使う近似だったため、正しい交差判定ができなかった。高さが分かれば
// レイと波面の交差点をきちんと探索できる。)
fn gerstnerSample(pos: vec2<f32>, time: f32) -> vec4<f32> {
  var dirs = array<vec2<f32>, 5>(
    normalize(vec2<f32>(1.0, 0.0)),
    normalize(vec2<f32>(0.6, 0.8)),
    normalize(vec2<f32>(-0.5, 0.87)),
    normalize(vec2<f32>(0.3, -0.95)),
    normalize(vec2<f32>(-0.8, -0.55)),
  );
  var wavelengths = array<f32, 5>(6.0, 3.6, 2.4, 1.5, 0.9);
  var amplitudes = array<f32, 5>(0.3, 0.18, 0.10, 0.055, 0.03);

  let qGlobal = 0.9; // トロコイドが尖りすぎない(自己交差しない)ように抑える全体の急峻さ

  var sumDx = 0.0;
  var sumDz = 0.0;
  var sumY = 0.0;
  var height = 0.0;

  for (var i = 0u; i < NUM_WAVES; i = i + 1u) {
    let dir = dirs[i];
    let k = 2.0 * PI / wavelengths[i];
    let amp = amplitudes[i];
    let omega = sqrt(9.8 * k);
    let q = qGlobal / (k * amp * f32(NUM_WAVES));
    let theta = k * dot(dir, pos) + omega * time;
    let c = cos(theta);
    let s = sin(theta);

    sumDx += dir.x * k * amp * c;
    sumDz += dir.y * k * amp * c;
    sumY += q * k * amp * s;
    height += amp * s;
  }

  let normal = normalize(vec3<f32>(-sumDx, 1.0 - sumY, -sumDz));
  return vec4<f32>(normal, height);
}

// レイと実際の波面(高さフィールド)の交差点を、区間探索+二分探索で求める。
// 戻り値はxyz=交差点の座標, w=見つかったら1.0/見つからなければ0.0。
fn intersectWater(ro: vec3<f32>, rd: vec3<f32>, time: f32) -> vec4<f32> {
  if (rd.y >= -0.0001) {
    return vec4<f32>(0.0, 0.0, 0.0, 0.0);
  }

  let maxDist = 40.0;
  let steps = 24u;
  let dt = maxDist / f32(steps);

  var t0 = 0.0;
  var f0 = ro.y - gerstnerSample(ro.xz, time).w;

  for (var i = 0u; i < steps; i = i + 1u) {
    let t1 = t0 + dt;
    let p1 = ro + rd * t1;
    let f1 = p1.y - gerstnerSample(p1.xz, time).w;

    if (f0 > 0.0 && f1 <= 0.0) {
      // この区間内で波面と交差した -> 二分探索で精密化
      var lo = t0;
      var hi = t1;
      var fLo = f0;
      for (var j = 0u; j < 8u; j = j + 1u) {
        let mid = 0.5 * (lo + hi);
        let pm = ro + rd * mid;
        let fm = pm.y - gerstnerSample(pm.xz, time).w;
        if ((fLo > 0.0) == (fm > 0.0)) {
          lo = mid;
          fLo = fm;
        } else {
          hi = mid;
        }
      }
      let tHit = 0.5 * (lo + hi);
      return vec4<f32>(ro + rd * tHit, 1.0);
    }

    t0 = t1;
    f0 = f1;
  }

  return vec4<f32>(0.0, 0.0, 0.0, 0.0); // 探索範囲内で波面が見つからなかった
}

struct OceanTraceResult {
  color: vec3<f32>,
  firstNormal: vec3<f32>, // フレネル計算用(最初にカメラのレイが水面に当たった点の法線)
  hitWater: f32,          // カメラのレイがそもそも水面に交差したか(1.0/0.0)
};

// 実際の波面との交差点をレイマーチングで求めながら反射を繰り返す(1回目の反射も含めて
// 反射回数としてカウントする)。上限まで繰り返しても交差点が見つからない(=十分遠くまで
// 波が無い、ほぼ水平に近い方向へ反射していった)場合は空とみなす。
fn traceOceanReflection(rayDir: vec3<f32>, rayOrigin: vec3<f32>, sunDir: vec3<f32>, iTime: f32, maxBounces: u32) -> OceanTraceResult {
  var dir = rayDir;
  var ro = rayOrigin;
  var firstNormal = vec3<f32>(0.0, 1.0, 0.0);

  for (var i = 0u; i < maxBounces; i = i + 1u) {
    let hit = intersectWater(ro, dir, iTime);
    if (hit.w < 0.5) {
      if (i == 0u) {
        // カメラのレイがそもそも水面に交差しなかった(極端に浅い角度) -> 空とみなす
        return OceanTraceResult(skyColor(dir, sunDir), vec3<f32>(0.0, 1.0, 0.0), 0.0);
      }
      return OceanTraceResult(skyColor(dir, sunDir), firstNormal, 1.0);
    }
    let hitPos = hit.xyz;
    let n = gerstnerSample(hitPos.xz, iTime).xyz;
    if (i == 0u) {
      firstNormal = n;
    }
    dir = reflect(dir, n);
    ro = hitPos + n * 0.01;
    if (dir.y >= -0.0005) {
      return OceanTraceResult(skyColor(dir, sunDir), firstNormal, 1.0);
    }
  }

  // 反射回数を使い切っても下向きのまま = 波が深すぎて交差点が見つからなかったケース
  var fallback = vec3<f32>(0.02, 0.05, 0.08); // 水面が水面自身を映す、それらしい暗い水色
  if (uniforms.params.y > 0.5) {
    fallback = uniforms.debugColor.rgb;
  }
  return OceanTraceResult(fallback, firstNormal, 1.0);
}

@fragment
fn fs_main(@builtin(position) fragCoord: vec4<f32>) -> @location(0) vec4<f32> {
  let res = uniforms.resAndTime.xy;
  let iTime = uniforms.resAndTime.z;
  let sunHour = uniforms.resAndTime.w;

  let ndc = (fragCoord.xy - 0.5 * res) / res.y;

  // 固定カメラ(水平方向を向く)
  let eye = vec3<f32>(0.0, 2.5, 0.0);
  let forward = vec3<f32>(0.0, 0.0, -1.0);
  let worldUp = vec3<f32>(0.0, 1.0, 0.0);
  let right = normalize(cross(forward, worldUp));
  let up = cross(right, forward);
  let fov = 1.5;
  let rayDir = normalize(forward + right * ndc.x * fov - up * ndc.y * fov);

  // 太陽の向きは時間では動かさず、時刻スライダーの値だけで決める
  let sunAngle = (sunHour - 6.0) / 12.0 * PI;
  let sunDir = normalize(vec3<f32>(cos(sunAngle) * 0.35, sin(sunAngle), -0.9));

  let maxBounces = u32(uniforms.params.x);

  var color: vec3<f32>;
  if (rayDir.y >= -0.0005) {
    // 水平線より上 -> 空をそのまま見る
    color = skyColor(rayDir, sunDir);
  } else {
    // 実際の波面とレイマーチングで交差判定を行い、反射回数の上限まで反射を試みる
    let result = traceOceanReflection(rayDir, eye, sunDir, iTime, maxBounces);

    if (result.hitWater < 0.5) {
      color = result.color; // 交差点が見つからなかった(=空とみなす)
    } else {
      // Fresnel(Schlick近似): 真上から見ると水色(透過)が主体、視線が水平に近づくほど反射が支配的になる
      let viewDir = -rayDir;
      let cosTheta = max(dot(viewDir, result.firstNormal), 0.0);
      let f0 = 0.02; // 空気->水の垂直入射反射率(屈折率1.33相当)
      let fresnel = f0 + (1.0 - f0) * pow(1.0 - cosTheta, 5.0);

      color = mix(uniforms.waterColor.rgb, result.color, fresnel);
    }
  }

  let mapped = color / (color + vec3<f32>(1.0));
  let gamma = pow(max(mapped, vec3<f32>(0.0)), vec3<f32>(1.0 / 2.2));
  return vec4<f32>(gamma, 1.0);
}
`;

async function main() {
  const canvas = document.getElementById('gpuCanvas');

  if (!navigator.gpu) {
    showError('このブラウザはWebGPUに対応していません。\nChrome/Edge の最新版などでお試しください。');
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    showError('WebGPUアダプタの取得に失敗しました。');
    return;
  }
  const device = await adapter.requestDevice();
  device.lost.then((info) => console.log('WebGPU device lost:', info.reason, info.message));

  const context = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const size = Math.max(1, Math.floor(Math.min(window.innerWidth, window.innerHeight) * dpr));
    canvas.width = size;
    canvas.height = size;
    context.configure({
      device,
      format,
      alphaMode: 'opaque',
    });
  }
  window.addEventListener('resize', resize);
  resize();

  const shaderModule = device.createShaderModule({ code: shaderCode });

  const pipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: {
      module: shaderModule,
      entryPoint: 'vs_main',
    },
    fragment: {
      module: shaderModule,
      entryPoint: 'fs_main',
      targets: [{ format }],
    },
    primitive: { topology: 'triangle-list' },
  });

  const uniformBuffer = device.createBuffer({
    size: 64,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  const bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
  });

  // UI: 太陽の時刻(バーで設定、デフォルト10:00) / 反射回数 / 失敗箇所の強調表示
  let sunHour = 10.0;
  let reflectionCount = 2;
  let debugHighlight = false;
  let debugColor = [1, 0, 1];

  const sunHourInput = document.getElementById('sunHour');
  const sunHourVal = document.getElementById('sunHourVal');
  function formatHour(h) {
    const hh = Math.floor(h);
    const mm = Math.round((h - hh) * 60);
    return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
  }
  sunHourInput.addEventListener('input', () => {
    sunHour = parseFloat(sunHourInput.value);
    sunHourVal.textContent = formatHour(sunHour);
  });

  const reflectionCountInput = document.getElementById('reflectionCount');
  const reflectionCountVal = document.getElementById('reflectionCountVal');
  reflectionCountInput.addEventListener('input', () => {
    reflectionCount = parseInt(reflectionCountInput.value, 10);
    reflectionCountVal.textContent = String(reflectionCount);
  });

  const debugHighlightInput = document.getElementById('debugHighlight');
  debugHighlightInput.addEventListener('input', () => {
    debugHighlight = debugHighlightInput.checked;
  });

  function hexToRgb(hex) {
    const v = parseInt(hex.slice(1), 16);
    return [((v >> 16) & 255) / 255, ((v >> 8) & 255) / 255, (v & 255) / 255];
  }

  const debugColorInput = document.getElementById('debugColor');
  debugColor = hexToRgb(debugColorInput.value);
  debugColorInput.addEventListener('input', () => {
    debugColor = hexToRgb(debugColorInput.value);
  });

  // フレネル透過成分の色(水そのものの色。反射失敗時のフォールバック色とは別の専用パラメータ)
  const waterColorInput = document.getElementById('waterColor');
  let waterColor = hexToRgb(waterColorInput.value);
  waterColorInput.addEventListener('input', () => {
    waterColor = hexToRgb(waterColorInput.value);
  });

  // 波のアニメーションの一時停止/再生(再生を押すと止めた時点から自然に再開する)
  let isPaused = false;
  let pausedElapsed = 0;
  let startTime = performance.now();
  function currentITime() {
    if (isPaused) return pausedElapsed;
    return (performance.now() - startTime) / 1000;
  }

  const pauseButton = document.getElementById('pauseButton');
  pauseButton.addEventListener('click', () => {
    if (isPaused) {
      startTime = performance.now() - pausedElapsed * 1000;
      isPaused = false;
      pauseButton.textContent = '一時停止';
    } else {
      pausedElapsed = (performance.now() - startTime) / 1000;
      isPaused = true;
      pauseButton.textContent = '再生';
    }
  });

  const uniformData = new Float32Array(16);

  function frame() {
    const iTime = currentITime();
    uniformData[0] = canvas.width;
    uniformData[1] = canvas.height;
    uniformData[2] = iTime;
    uniformData[3] = sunHour;
    uniformData[4] = reflectionCount;
    uniformData[5] = debugHighlight ? 1 : 0;
    uniformData[6] = 0;
    uniformData[7] = 0;
    uniformData[8] = debugColor[0];
    uniformData[9] = debugColor[1];
    uniformData[10] = debugColor[2];
    uniformData[11] = 0;
    uniformData[12] = waterColor[0];
    uniformData[13] = waterColor[1];
    uniformData[14] = waterColor[2];
    uniformData[15] = 0;
    device.queue.writeBuffer(uniformBuffer, 0, uniformData);

    const encoder = device.createCommandEncoder();
    const pass = encoder.beginRenderPass({
      colorAttachments: [{
        view: context.getCurrentTexture().createView(),
        clearValue: { r: 0, g: 0, b: 0, a: 1 },
        loadOp: 'clear',
        storeOp: 'store',
      }],
    });
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.draw(3);
    pass.end();
    device.queue.submit([encoder.finish()]);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function showError(message) {
  const el = document.getElementById('error');
  el.textContent = message;
  el.style.display = 'block';
}

main().catch((err) => {
  console.error(err);
  showError('エラーが発生しました:\n' + err.message);
});
</script>
</body>
</html>
