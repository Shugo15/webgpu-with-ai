<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>WebGPU Shader Playground</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #0b0b0f;
    color: #eee;
    font-family: system-ui, sans-serif;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    box-sizing: border-box;
  }
  h1 {
    margin: 0 0 0.5rem;
    font-size: 1.8rem;
  }
  p.lead {
    color: #aaa;
    margin: 0 0 2rem;
  }
  ul.shader-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }
  ul.shader-list li a {
    display: block;
    padding: 1.25rem;
    border-radius: 10px;
    background: #1a1a22;
    border: 1px solid #2a2a35;
    color: #eee;
    text-decoration: none;
  }
  ul.shader-list li a:hover {
    background: #23232e;
    border-color: #3a3a48;
  }
  ul.shader-list li a .name {
    display: block;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  ul.shader-list li a .desc {
    display: block;
    font-size: 0.85rem;
    color: #999;
  }
</style>
</head>
<body>
<main>
  <h1>WebGPU Shader Playground</h1>
  <p class="lead">WGSLフラグメントシェーダーの実験置き場。各リンクからシェーダーページを開けます。</p>
  <ul class="shader-list">
    <li>
      <a href="shaders/rotating-hue-gradient.html">
        <span class="name">回転する色相グラデーション</span>
        <span class="desc">画面中心を軸に回転しながら色相が変化するグラデーション</span>
      </a>
    </li>
    <li>
      <a href="shaders/cornell-box-pathtracing.html">
        <span class="name">Cornell Box レイマーチング</span>
        <span class="desc">SDFレイマーチング+簡易パストレーシングで描画するCornell Box。反射回数・レイ数を調整可能で、フレームを重ねて時間積分しノイズを収束させる</span>
      </a>
    </li>
  </ul>
</main>
</body>
</html>
